# Kernel filesystem-parser module blacklist for the air-gapped Nebula CA USB
# job harness.
#
# THREAT MODEL: an untrusted USB stick could be crafted to present a
# filesystem type OTHER than vfat, hoping udev/automount/an operator `mount`
# probes it and hands the (much larger, less-audited) ntfs3/udf/hfs+/etc.
# in-kernel parser a hostile image pre-auth. This project's PRIMARY defense
# is that this harness only ever does `mount -t vfat`, never auto-probes,
# plus USBGuard (box/usbguard/); this file is DEFENSE IN DEPTH for anything
# that might still call `modprobe <fs-name>` on this box (an operator's
# manual `mount -t ntfs3 ...` while debugging, a udisks2/automount daemon if
# one is ever (re)installed, etc.).
#
# `install <fs> /bin/false` (not `blacklist <fs>`): `blacklist` only
# suppresses automatic loading via module ALIASES (e.g. hardware
# auto-detection) -- it does NOT stop an explicit `modprobe <fs>` or the
# kernel's own `request_module("fs-<fs>")` call made from inside `mount(2)`
# when a filesystem type isn't already loaded. `install <fs> /bin/false`
# intercepts modprobe's actual module-loading action for that exact name and
# substitutes a command that always fails instead -- so even a `mount -t
# ntfs3 ...` that would otherwise trigger an on-demand module load fails
# closed. Applied ONLY to modules CONFIRMED loadable (=m) on this exact
# kernel; see the BUILT-IN caveat below for why most of the candidates
# named here can't be handled this way at all.
#
# --- Verified =m (this file blacklists these) --------------------------
# Checked on nebula-ca, kernel 6.1.141, 2026-07-13, via
# `/lib/modules/6.1.141/modules.builtin` (absent from it) + a real .ko file
# present on disk under /lib/modules/6.1.141/kernel/fs/... (present), cross-
# checked a THIRD way with `modprobe -n -v <name>` (each resolves to an
# `install /bin/false` action, confirming modprobe itself agrees these are
# real, present, loadable modules) -- /proc/config.gz and /boot/config-* are
# both unavailable on this board, so this trio of checks is the
# confirmation method.
install udf /bin/false
install ntfs3 /bin/false
install ntfs /bin/false
install hfs /bin/false
install hfsplus /bin/false

# --- Candidates considered but NOT PRESENT AT ALL ----
# (neither =y nor =m -- CONFIG_JFS_FS / CONFIG_CRAMFS is simply not set for
# this kernel build; confirmed a third way too: `modprobe -n -v jfs` and
# `... cramfs` both report "Module ... not found in directory
# /lib/modules/6.1.141", not merely "blacklisted". No module exists to
# blacklist, and nothing needs to be done for it. Listed here, inert, so a
# future kernel/image rebuild that DOES enable one of these as =m is caught
# by re-running this verification rather than silently staying
# unprotected.)
# install jfs /bin/false      # jfs: not present (=n) on kernel 6.1.141 -- no-op if uncommented
# install cramfs /bin/false   # cramfs: not present (=n) on kernel 6.1.141 -- no-op if uncommented

# --- BUILT-IN (=y): modprobe.d is INERT against these, by design --------
# These are compiled directly into vmlinuz -- there is no loadable .ko for
# `install .../bin/false` to intercept, so a blacklist entry for any of them
# would do PRECISELY NOTHING (confirmed: none of these eight names have a
# .ko file anywhere under /lib/modules/6.1.141, all eight appear in
# modules.builtin, AND `modprobe -n -v <name>` against each prints nothing
# at all -- no install/insmod action, because there is no module to act on).
# This is exactly the same gap: "modprobe can't stop built-in
# usbhid" generalizes to the whole built-in set below. The REAL
# defenses for these are (1) the pinned `-t vfat` mount (this harness
# never asks the kernel to auto-probe/parse anything else) and (2) USBGuard
# (box/usbguard/) rejecting non-mass-storage/HID-composite devices before
# udev/mount ever sees them.
#   vfat, exfat, fat   -- the FAT-family parsers this harness actually
#                          mounts; built in, so they're always
#                          present regardless -- the mount-type PIN is what
#                          keeps a hostile OTHER-fs image from ever reaching
#                          a parser, not an inability to load one.
#   squashfs           -- also built in on this kernel (not merely
#                          hypothetical: confirmed present in
#                          modules.builtin, same as vfat/exfat).
#   usb-storage, uas    -- the USB mass-storage transport + UAS drivers
#                          (uas being built-in means blacklisting it for
#                          "force BOT fallback" defense-in-depth
#                          is likewise not possible on this kernel -- moot).
#   usbcore             -- the USB core itself; obviously can't be
#                          blacklisted (nothing would enumerate at all).
#   usbhid, hid-generic -- the HID transport + generic HID input drivers
#                          ("modprobe can't stop built-in usbhid" --
#                          confirmed literally true here); USBGuard's
#                          `reject with-interface one-of { 03:*:* }`
#                          (box/usbguard/rules.conf) is what actually stops
#                          a HID device, by refusing it USB authorization
#                          before usbhid/hid-generic ever bind to it.
