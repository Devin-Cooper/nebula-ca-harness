# tmpfiles.d entry for the ca-usb-job harness ("flock file must be on a
# writable path").
#
# /run is a tmpfs, cleared on every boot -- and the (future) ca-usb-job@.service
# unit runs under ProtectSystem=strict, which makes /run read-only to it except
# for paths explicitly listed in ReadWritePaths=. /run/ca-usb is that carved-out
# writable path: it holds the global harness flock ("flock/run/ca-usb-job.lock",
# opened O_CLOEXEC) that serializes concurrent ca-usb-job@.service
# instances. Provisioned here (rather than left to the unit's RuntimeDirectory=,
# which is torn down with the unit) so it exists independent of any one job run
# and survives across the unit going active/inactive between insertions.
#
# Type Path         Mode UID  GID  Age Argument
d      /run/ca-usb  0700 root root -
