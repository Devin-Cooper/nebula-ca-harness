# USBGuard policy for the air-gapped Nebula CA USB job harness.
#
# WRITE-AND-VALIDATE-ONLY ARTIFACT: this file is installed by box/install.sh
# but usbguard.service is deliberately left DISABLED/STOPPED by that script.
# Enabling it (systemctl enable --now usbguard) is a later, DELIBERATE
# operator step taken with the serial console available as a fallback
# -- not something install.sh or this file's mere presence does. See
# tests/integration/13-usbguard.md for the deferred enable/verify checklist.
#
# --- Provenance of the baseline below -----------------------------
# "Baseline via `usbguard generate-policy` (captures the root hub / any
# controller devices) rather than a hand-written storage-only allow... USB-A
# is direct to the xHCI root hub (root hubs are exempt from
# authorized_default), so the immediate hub-stranding risk is low -- but
# generate-policy keeps it robust across kernel/topology changes."
#
# The device-specific `allow` lines below are what `usbguard generate-policy`
# emits: the USB host controllers the board exposes, plus each device attached
# at generation time (in a CA deployment, the CA-XFER transfer stick). It
# matches by id+serial+name+hash+parent-hash+interface+connect-type -- a match
# effectively unique to one physical device, so pinning it means enabling the
# policy later cannot strand the exact stick the CA transfers depend on.
#
# THESE ARE PLACEHOLDERS in this published template. The serials and descriptor
# hashes are specific to one physical box + stick, so you MUST regenerate them
# on YOUR OWN hardware -- do not ship someone else's:
#
#     sudo usbguard generate-policy > /tmp/gen.conf   # then paste its device
#                                                     # lines here, keeping the
#                                                     # class rules further down
#
# You do NOT need any device-specific line for a stick to work: a plain
# mass-storage stick is authorized by the class rule `allow with-interface
# equals { 08:*:* }` below regardless. Pinning id+serial+hash only adds a
# defence-in-depth "this exact device" match; a new/replacement stick simply
# falls through to that class rule. Example shape (replace every <PLACEHOLDER>):
#
# allow id 1d6b:0002 serial "<controller-serial>" name "EHCI Host Controller" hash "<HASH>" with-interface 09:00:00
# allow id 1d6b:0001 serial "<controller-serial>" name "Generic Platform OHCI controller" hash "<HASH>" with-interface 09:00:00
# allow id 1d6b:0002 serial "<controller-serial>" name "xHCI Host Controller" hash "<HASH>" with-interface 09:00:00
# allow id 1d6b:0003 serial "<controller-serial>" name "xHCI Host Controller" hash "<HASH>" with-interface 09:00:00
# allow id <VID:PID> serial "<YOUR-STICK-SERIAL>" name "<STICK-NAME>" hash "<HASH>" with-interface 08:06:50 with-connect-type "unknown"

# --- Explicit class policy, on top of the baseline ----
# Rules are evaluated top-to-bottom, FIRST MATCH WINS (usbguard-rules.conf(5)
# "RULE LANGUAGE"). Placed AFTER the device-specific baseline above so the
# already-attached root hubs + CA-XFER stick keep matching their own exact
# lines, unaffected by anything below. The two `reject`s are listed BEFORE
# the general mass-storage `allow` as defense in depth for any FUTURE/
# replacement device not already covered by name above -- see the note on
# `equals` below for why this ordering is actually belt-and-suspenders
# rather than load-bearing.
#
# Reject a device that presents BOTH a mass-storage (class 08) interface AND
# a HID (class 03) interface on the SAME device -- the canonical BadUSB
# combo (a flash drive that also enumerates a hidden keyboard to inject
# keystrokes). `all-of` = the device's interface set contains a match for
# EACH listed pattern (not necessarily the same interface), which is exactly
# "has an 08 interface AND has a 03 interface" regardless of how many other
# interfaces it also has. This is the man page's own worked example 3
# ("Reject devices with suspicious combination of interfaces"), narrowed
# from its four separate HID/CDC/wireless/network variants down to the one
# relevant here explicitly (HID); broadened from the man page's
# 03:00:*/03:01:* (keyboard/mouse only) split to plain 03:*:* (every HID
# subclass/protocol), matching the "HID = intrusion signal" policy without
# needing to enumerate every HID sub-type by hand.
reject with-interface all-of { 08:*:* 03:*:* }

# Reject ANY device with a HID interface at all, composite or not --
# "reject HID/composite"; "HID = intrusion signal." This is what actually
# rejects a bare USB keyboard/mouse (no storage interface, so the all-of
# line above doesn't apply to it) per the test gate ("plug a USB
# keyboard -> REJECTED").
reject with-interface one-of { 03:*:* }

# Allow plain USB mass storage: the device's ENTIRE interface set must be
# exactly one interface, class 08 (Mass Storage), any subclass/protocol
# (matches SCSI-transparent/Bulk-only flash drives like the CA-XFER stick,
# and is verbatim the man page's own "Allow USB mass storage devices (USB
# flash disks) and block everything else" canonical policy). Because
# `equals` requires the device's interface set to be EXACTLY this one
# pattern, a storage+HID (or storage+anything-else) composite device
# structurally CANNOT match this line at all, regardless of rule order --
# it necessarily falls through to the reject rules above, or, for a
# composite that isn't storage+HID specifically, to ImplicitPolicyTarget
# (usbguard-daemon.conf, set to `reject` by this install) below.
# Caveat (not this box's hardware, noted for completeness): a multi-LUN
# card reader presenting >1 mass-storage interface would also fail to match
# `equals` here and would need its own device-specific allow line (as the
# baseline above provides for the real, single-interface CA-XFER stick).
allow with-interface equals { 08:*:* }

# No trailing catch-all `block`/`reject` line: unmatched devices fall
# through to ImplicitPolicyTarget=reject in usbguard-daemon.conf (this
# install sets it explicitly; see box/usbguard/usbguard-daemon.conf), so
# there is exactly one place that governs "everything else," not two.
