<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" width="980" height="520" font-family="Helvetica,Arial,sans-serif">
<rect width="980" height="520" fill="#fff"/>
<rect x="4" y="4" width="972" height="512" rx="18" fill="none" stroke="#cbd5e1" stroke-width="2"/>
<defs><marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2563eb"/></marker><marker id="arG" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#16a34a"/></marker></defs>
<text x="30" y="50" font-size="30" font-weight="bold" fill="#0f172a">How a job flows</text>
<text x="30" y="80" font-size="18" fill="#64748b">You sign on the laptop; the box verifies, waits for a button press, runs, and writes results back.</text>
<rect x="24" y="110" width="300" height="330" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 5"/>
<text x="40" y="134" font-size="13" font-weight="bold" fill="#d97706" letter-spacing="1">UNTRUSTED &#183; YOUR LAPTOP</text>
<rect x="656" y="110" width="300" height="330" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
<text x="672" y="134" font-size="13" font-weight="bold" fill="#16a34a" letter-spacing="1">TRUSTED &#183; AIR-GAPPED BOX</text>
<text x="404" y="134" font-size="13" font-weight="bold" fill="#64748b" letter-spacing="1">USB STICK (UNTRUSTED)</text>
<rect x="104" y="170" width="120" height="74" rx="7" fill="#fff" stroke="#d97706" stroke-width="3"/><rect x="114" y="180" width="100" height="54" rx="3" fill="#d97706" opacity="0.10"/><path d="M90 262 L238 262 L224 248 L104 248 Z" fill="#fff" stroke="#d97706" stroke-width="3" stroke-linejoin="round"/>
<text x="164" y="300" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">caj build</text>
<text x="164" y="322" text-anchor="middle" font-size="14" fill="#64748b">sign with your key</text>
<text x="164" y="360" text-anchor="middle" font-size="17" font-weight="bold" fill="#0f172a">caj-recv</text>
<text x="164" y="382" text-anchor="middle" font-size="14" fill="#64748b">verify &amp; file results</text>
<rect x="476" y="206" width="26" height="22" rx="2" fill="#64748b"/><rect x="470" y="226" width="38" height="86" rx="5" fill="#fff" stroke="#64748b" stroke-width="3"/><circle cx="489" cy="298" r="6" fill="none" stroke="#64748b" stroke-width="3"/>
<rect x="730" y="180" width="150" height="108" rx="9" fill="#fff" stroke="#16a34a" stroke-width="3"/><line x1="746" y1="204" x2="826" y2="204" stroke="#16a34a" stroke-width="3" opacity="0.5"/><line x1="746" y1="224" x2="826" y2="224" stroke="#16a34a" stroke-width="3" opacity="0.5"/><line x1="746" y1="244" x2="826" y2="244" stroke="#16a34a" stroke-width="3" opacity="0.5"/><circle cx="854" cy="206" r="7" fill="#16a34a"/><circle cx="842" cy="250" r="10" fill="none" stroke="#d97706" stroke-width="3"/><line x1="851" y1="250" x2="872" y2="250" stroke="#d97706" stroke-width="3"/><line x1="866" y1="250" x2="866" y2="259" stroke="#d97706" stroke-width="3"/><line x1="872" y1="250" x2="872" y2="259" stroke="#d97706" stroke-width="3"/>
<text x="672" y="318" font-size="15" fill="#0f172a">1  mount ro, noexec</text>
<text x="672" y="342" font-size="15" fill="#0f172a">2  verify signature</text>
<text x="672" y="366" font-size="15" fill="#0f172a">3  wait for K1 press</text>
<text x="672" y="390" font-size="15" fill="#0f172a">4  run the operation</text>
<text x="672" y="414" font-size="15" fill="#0f172a">5  commit + write outbox</text>
<line x1="240" y1="230" x2="452" y2="230" stroke="#2563eb" stroke-width="3" marker-end="url(#ar)"/>
<line x1="524" y1="230" x2="726" y2="230" stroke="#2563eb" stroke-width="3" marker-end="url(#ar)"/>
<text x="384" y="218" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">inbox/</text>
<text x="384" y="250" text-anchor="middle" font-size="13" fill="#64748b">job.tar + .sig</text>
<line x1="726" y1="400" x2="524" y2="400" stroke="#16a34a" stroke-width="3" marker-end="url(#arG)"/>
<line x1="452" y1="400" x2="240" y2="400" stroke="#16a34a" stroke-width="3" marker-end="url(#arG)"/>
<text x="384" y="388" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">outbox/</text>
<text x="384" y="420" text-anchor="middle" font-size="13" fill="#64748b">results + status</text>
</svg>